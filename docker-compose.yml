version: '3.8'

services:
  # Mandatory Redis instance for message brokering and pub/sub 
  redis:
    image: "redis:alpine"
    container_name: redis_broker
    ports:
      - "6379:6379"

  # First Server Instance 
  server1:
    build: .
    container_name: chat_server_1
    command: ["60005"]
    ports:
      - "60005:60005"
    depends_on:
      - redis
    environment:
      - REDIS_HOST=redis

  # Second Server Instance (Distributed Testing) 
  server2:
    build: .
    container_name: chat_server_2
    command: ["60006"]
    ports:
      - "60006:60006"
    depends_on:
      - redis
    environment:
      - REDIS_HOST=redis